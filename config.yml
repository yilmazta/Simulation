assumptions:
  walkin_jitter:
    dist: triang
    min_minutes: -10
    mode_minutes: 0
    max_minutes: 5
    note: Patient crossed the front door somewhere in this window relative to MUAYENE_KABUL_ZAMANI.
  appointment_jitter:
    dist: triang
    min_minutes: -10
    mode_minutes: 0
    max_minutes: 5
    note: Same front-door uncertainty as walk-in_jitter, applied to MUAYENE_KABUL_ZAMANI
      for scheduled patients when fitting inter-arrivals.
  follow_up_day: Wednesday
  late_arrival_cutoff: '16:00'
  scoliosis_room_id: 160
  appointment_deviation_hours: 1.0
  xray_service_time_method:
    definition: consecutive-departure gap on same (_date, xray_room_type)
    idle_cutoff_minutes: 15.0
    note: Gaps > idle_cutoff_minutes are treated as machine idle time and excluded
      from the service-time sample.
