        - start: 08:00
          end: '12:00'
          interval_minutes: 6
        - start: '13:00'
          end: '16:00'
          interval_minutes: 6
      schedule_2:
        description: Mixed intervals by block
        windows:
        - start: 08:00
          end: '10:00'
          interval_minutes: 6
        - start: '10:00'
          end: '12:00'
          interval_minutes: 10
        - start: '13:00'
          end: '15:00'
          interval_minutes: 8
        - start: '15:00'
          end: '16:00'
          interval_minutes: 10
      schedule_3:
        description: 'Morning only: 6 min then 8 min'
        windows:
        - start: 08:00
          end: '10:00'
          interval_minutes: 6
        - start: '10:00'
          end: '12:00'
          interval_minutes: 8
    department_schedules:
